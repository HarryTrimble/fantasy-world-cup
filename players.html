  <style>
    :root {
      --bg: #08111f;
      --card: #111c2e;
      --text: #f6f8fb;
      --muted: #aab7c8;
      --accent: #40e0a0;
      --accent-2: #59a7ff;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(64,224,160,0.22), transparent 34rem),
        radial-gradient(circle at top right, rgba(89,167,255,0.18), transparent 34rem),
        var(--bg);
      min-height: 100vh;
    }

    header, main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .controls, .player-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 24px;
    }

    .hero-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 32px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 22px;
      min-height: 136px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .stat-value {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .site-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      width: 100%;
      max-width: 560px;
      margin-bottom: 22px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(8,17,31,0.42);
      backdrop-filter: blur(12px);
    }

    .site-nav::-webkit-scrollbar {
      display: none;
    }

    .site-nav a {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 14px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 850;
      font-size: 1rem;
      line-height: 1;
      white-space: nowrap;
      transition: background 160ms ease, color 160ms ease;
    }

    .site-nav a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .site-nav a.active {
      color: #06101d;
      background: var(--accent);
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-weight: 800;
      font-size: 0.8rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .subtitle {
      max-width: 820px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .controls {
      padding: 18px;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
      position: sticky;
      top: 12px;
      z-index: 5;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(8,17,31,0.72);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
    }

    input::placeholder { color: #77869a; }
    select option { background: #111c2e; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .player-card { overflow: hidden; }

    .country-header {
      padding: 22px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
      background: radial-gradient(circle at top left, rgba(64,224,160,0.12), transparent 62%);
    }

    .country-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.55rem;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 900;
      font-size: 0.82rem;
      border: 1px solid rgba(89,167,255,0.28);
      background: rgba(89,167,255,0.15);
      color: #b9d7ff;
      white-space: nowrap;
    }

    .tag.good {
      border-color: rgba(64,224,160,0.28);
      background: rgba(64,224,160,0.12);
      color: #a9ffd8;
    }

    .list { padding: 10px 22px 18px; }

    .row {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .row:last-child { border-bottom: 0; }

    .flag-img {
      width: 1em;
      height: 1em;
      vertical-align: -0.1em;
      display: inline-block;
    }

    .shirt {
      width: 34px;
      height: 34px;
      color: var(--accent-2);
    }

    .player-name {
      font-weight: 950;
      font-size: 1.05rem;
    }

    .player-meta {
      color: var(--muted);
      margin-top: 4px;
      font-size: 0.9rem;
    }

    .why {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
      margin-top: 5px;
    }

    .role {
      color: var(--text);
      font-weight: 900;
      border-left: 1px solid rgba(255,255,255,0.18);
      padding-left: 16px;
      white-space: nowrap;
    }

    .no-results {
      display: none;
      color: var(--muted);
      text-align: center;
      padding: 40px 12px;
    }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }

      .grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; }
      
      .controls { grid-template-columns: 1fr; position: static; }
    }

    @media (max-width: 560px) {
      .stats-grid { display: none; }


      .site-nav {
        width: 100%;
        max-width: 100%;
        gap: 8px;
      }

      .site-nav a {
        min-width: 0;
        font-size: 1rem;
        padding: 12px 10px;
      }

      header, main { padding: 18px 12px; }
      .controls, .player-card { border-radius: 22px; }
      .hero-card { padding: 24px; }
      h1 { font-size: clamp(2.2rem, 13vw, 3.6rem); }
      .country-header { flex-direction: column; }
      .row { grid-template-columns: 34px 1fr; }
      .role { grid-column: 2; border-left: 0; padding-left: 0; color: var(--accent); }
    }
  
@media (max-width: 560px) {
  .site-nav {
    gap: 8px;
    padding: 8px;
    max-width: 100%;
  }

  .site-nav a {
    padding: 13px 8px;
    font-size: 0.92rem;
  }
}

</style>

    function addPlayerFixture(team, flag, rank, group, fixture, opponent, opponentFlag, opponentRank) {
      if (!fixtureLookup.has(team)) {
        fixtureLookup.set(team, { team, flag, rank, group, games: [] });
      }

      fixtureLookup.get(team).games.push({ ...fixture, opponent, opponentFlag, opponentRank });
    }

      const fixture = {
        index,
        day: row[0], date: row[1], time: row[2], city: row[3], temp: row[4], group: row[5], matchday: row[6],
        flag1: row[7], team1: row[8], team2: row[9], flag2: row[10], rank1: row[11], rank2: row[12], gap: row[13]
      };

      addPlayerFixture(fixture.team1, fixture.flag1, fixture.rank1, fixture.group, fixture, fixture.team2, fixture.flag2, fixture.rank2);
      addPlayerFixture(fixture.team2, fixture.flag2, fixture.rank2, fixture.group, fixture, fixture.team1, fixture.flag1, fixture.rank1);
    });

      const fixtureName = fixtureCountryName(team.country);
      const fixtureData = fixtureLookup.get(fixtureName);

      team.rank = fixtureData?.rank || fifaRanks[team.country] || fifaRanks[fixtureName] || 999;
      team.fixtures = fixtureData?.games || [];

    function gapClass(teamRank, opponentRank) {
      const diff = opponentRank - teamRank;

      if (diff >= 45) return 'gap-high';
      if (diff >= 16) return 'gap-mid';
      if (diff > -16) return 'gap-midlow';
      if (diff > -45) return 'gap-low';
      return 'gap-danger';
    }

        function readableNumberColour(hex) {
      const clean = String(hex || '#59a7ff').replace('#', '');
      const r = parseInt(clean.substring(0, 2), 16);
      const g = parseInt(clean.substring(2, 4), 16);
      const b = parseInt(clean.substring(4, 6), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.58 ? '#08111f' : '#ffffff';
    }

      if (role === 'GK') {

      if (role === 'DEF') {
        return `${defendingStats}<span class="player-meta-separator">•</span>${attackingStats}`;

      const gkId = `gk-${country.replace(/[^a-z0-9]/gi, '').toLowerCase()}-${number}-${Math.random().toString(36).slice(2)}`;

      const fills = [

        kit.sleeves,

    function playerShirtSvg(player) {
      return player.role === 'GK'
        ? goalkeeperShirtSvg(player.team.country, player.number)
        : shirtSvg(player.team.country, player.number, player.role);
    }

    function populateStats() {
      const statPlayers = [
        {
          id: 'statCard0',
          country: 'England', flag: englandFlag, name: 'Kane',
          number: 9, role: 'FWD',
          label: '💰 Most expensive',
          sub: '$10m · xGI 1.18'
        },
        {
          id: 'statCard1',
          country: 'Japan', flag: '🇯🇵', name: 'Ito',
          number: 19, role: 'DEF',
          label: '🛡️ Best defender pick',
          sub: 'Japan form · vs Netherlands'
        },
        {
          id: 'statCard2',
          country: 'Iran', flag: '🇮🇷', name: 'Taremi',
          number: 9, role: 'FWD',
          label: '⚡ Best bargain',
          sub: '$6.5m · xGI 0.88'
        },
        {
          id: 'statCard3',
          country: 'Spain', flag: '🇪🇸', name: 'Yamal',
          number: 11, role: 'MID',
          label: '🏆 MD1 captain pick',
          sub: 'xGI 1.27 · vs Cape Verde'
        }
      ];

      statPlayers.forEach(p => {
        const el = document.getElementById(p.id);
        if (!el) return;
        const shirt = shirtSvg(p.country, p.number, p.role);
        el.innerHTML = `
          <div style="display:flex;align-items:center;gap:12px;min-width:0">
            <div style="flex:0 0 auto;width:44px;height:44px;display:flex;align-items:center;justify-content:center">${shirt}</div>
            <div style="min-width:0">
              <div style="font-size:1.15rem;font-weight:900;letter-spacing:-0.03em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.flag} ${p.name}</div>
              <div style="color:var(--muted);font-size:0.78rem;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.country} · ${p.role}</div>
            </div>
          </div>
          <div>
            <div style="color:var(--accent);font-weight:800;font-size:0.78rem;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:2px">${p.label}</div>
            <div style="color:var(--muted);font-size:0.82rem">${p.sub}</div>
          </div>
        `;
      });
    }


    const rolePrices = {
      FWD: '$9m',
      MID: '$7.5m',
      DEF: '$5m',
      GK: '$5m',
      'PENS': '$9m'
    };

    const playerPrices = {
      'Kane': '$10m',
      'Mbappe': '$10m',
      'Taremi': '$6.5m'
    };

    
const shortRole = role => ({
  'Forward': 'FWD',
  'Midfielder': 'MID',
  'Defender': 'DEF',
  'Goalkeeper': 'GK',
  'Penalty taker': 'PENS'
}[role] || role);


    function render() {
      const query = searchInput.value.toLowerCase();
      const group = groupFilter.value;
      const role = roleFilter.value;
      const sort = sortSelect.value;

      const roleRows = [
        ['FWD', 'forward'],
        ['MID', 'midfielder'],
        ['DEF', 'defender'],
        ['GK', 'goalkeeper'],
        ['PENS', 'penalty']
      ];

      let rows = teams.flatMap(team =>
        roleRows
          .filter(([label]) => !role || label === role)
          .map(([label, key]) => {
            const pick = normalisePick(team.picks[key], key);
            return {
              team,
              role: label,
              name: pick.name,
              why: pick.why,
              number: pick.number,
              club: pick.club,
              statLine: playerStatLine(label, pick),
              xGI: parseFloat(pick.xGI || '0.56'),
              xG: parseFloat(pick.xG || pick.xGI || '0.56'),
              xA: parseFloat(pick.xA || '0.00'),
              xGC: parseFloat(pick.xGC || '0.82'),
              price: playerPrices[pick.name] || rolePrices[label] || '$5m'
            };
          })
      ).filter(player => {
        const searchable = `${player.name} ${player.why} ${player.team.country} ${shortRole(player.role)}`.toLowerCase();
        return (!group || player.team.group === group) &&
          (!query || searchable.includes(query));
      });

      rows.sort((a, b) => {
        if (sort === 'rank') return a.team.rank - b.team.rank || a.name.localeCompare(b.name);
        
        if (sort === 'price') {
          const priceValue = (price) => {
            const match = String(price).match(/[\d.]+/);
            return match ? parseFloat(match[0]) : 0;
          };

          return priceValue(b.price) - priceValue(a.price) || a.name.localeCompare(b.name);
        }

        if (sort === 'country') return a.team.country.localeCompare(b.team.country) || a.role.localeCompare(b.role);

        if (sort === 'xg') {
          const aEligible = a.role !== 'GK';
          const bEligible = b.role !== 'GK';

          if (aEligible && !bEligible) return -1;
          if (!aEligible && bEligible) return 1;

          return b.xG - a.xG || a.name.localeCompare(b.name);
        }

        if (sort === 'xa') {
          const aEligible = a.role !== 'GK';
          const bEligible = b.role !== 'GK';

          if (aEligible && !bEligible) return -1;
          if (!aEligible && bEligible) return 1;

          return b.xA - a.xA || a.name.localeCompare(b.name);
        }

        if (sort === 'xgc') {
          const aEligible = a.role === 'DEF' || a.role === 'GK';
          const bEligible = b.role === 'DEF' || b.role === 'GK';

          if (aEligible && !bEligible) return -1;
          if (!aEligible && bEligible) return 1;

          return a.xGC - b.xGC || a.name.localeCompare(b.name);
        }

        return a.team.group.localeCompare(b.team.group) || a.team.rank - b.team.rank || a.role.localeCompare(b.role);
      });

      currentPlayers = rows;

      playerGrid.innerHTML = rows.map((player, index) => `
        <article class="player-card individual-player-card">
          <div class="player-card-main">
            <div class="player-inline-header">
              <div class="player-shirt-wrap">
                ${playerShirtSvg(player)}
              </div>

              <div class="player-copy">
                <div class="player-name">${player.name}</div>

                <div class="player-country-subtitle">
                  ${player.team.flag} ${player.team.country}
                  <span class="player-meta-dot">•</span>
                  ${shortRole(player.role)}
                  <span class="player-meta-dot">•</span>
                  ${player.price}
                </div>
              </div>
            </div>

            <button class="full-profile-button" type="button" data-player-index="${index}" aria-label="Open full profile for ${player.name}">
              Full profile
            </button>
          </div>
        </article>
      `).join('');

      noResults.style.display = rows.length ? 'none' : 'block';
    }

    [searchInput, groupFilter, roleFilter, sortSelect].forEach(el => el.addEventListener('input', render));
    playerGrid.addEventListener('click', event => {
      const button = event.target.closest('.full-profile-button');
      if (!button) return;

      const player = currentPlayers[Number(button.dataset.playerIndex)];
      if (player) openProfileModal(player);
    });

    profileModalClose.addEventListener('click', closeProfileModal);

    profileModal.addEventListener('click', event => {
      if (event.target === profileModal) closeProfileModal();
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && profileModal.classList.contains('is-open')) {
        closeProfileModal();
      }
    });

    populateStats();
    render();
  </script>
