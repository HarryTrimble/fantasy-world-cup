<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Fantasy Teams</title>
  <style>
    :root {
      --bg: #08111f;
      --card: #111c2e;
      --text: #f6f8fb;
      --muted: #aab7c8;
      --accent: #40e0a0;
      --accent-2: #59a7ff;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(64,224,160,0.22), transparent 34rem),
        radial-gradient(circle at top right, rgba(89,167,255,0.18), transparent 34rem),
        var(--bg);
      min-height: 100vh;
    }

    header, main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .hero, .controls, .team-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 32px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-weight: 800;
      font-size: 0.8rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: 0.95;
    }

    .subtitle {
      max-width: 780px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .site-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-start;
      width: fit-content;
      margin-bottom: 32px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(8,17,31,0.42);
    }

    .site-nav a {
      text-decoration: none;
      padding: 9px 16px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 850;
      transition: background 160ms ease, color 160ms ease;
    }

    .site-nav a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .site-nav a.active {
      color: #06101d;
      background: var(--accent);
    }

    .controls {
      padding: 18px;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
      position: sticky;
      top: 12px;
      z-index: 5;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(8,17,31,0.72);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
    }

    select option { background: #111c2e; }
    input::placeholder { color: #77869a; }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .team-card {
      overflow: hidden;
    }

    .team-header {
      padding: 22px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      background: radial-gradient(circle at top left, rgba(64,224,160,0.12), transparent 60%);
    }

    .team-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.6rem;
      font-weight: 950;
    }

    .flag-img {
      width: 1em;
      height: 1em;
      vertical-align: -0.1em;
      display: inline-block;
    }

    .rank-pill, .group-pill, .result-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 900;
      border: 1px solid rgba(89,167,255,0.28);
      background: rgba(89,167,255,0.15);
      color: #b9d7ff;
      white-space: nowrap;
    }

    .group-pill {
      background: rgba(64,224,160,0.12);
      color: #a9ffd8;
      border-color: rgba(64,224,160,0.28);
    }

    .team-body {
      padding: 18px 22px 22px;
      display: grid;
      gap: 18px;
    }

    .section-title {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.75rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .last-five {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .result-pill {
      min-width: 42px;
      background: rgba(255,255,255,0.055);
      color: var(--text);
      border-color: var(--border);
    }

    .games {
      display: grid;
      gap: 10px;
    }

    .game {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(8,17,31,0.4);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .game-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .opponent {
      font-weight: 900;
      font-size: 1rem;
    }

    .game-meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .meta-value {
      display: block;
      color: var(--text);
      font-weight: 850;
      margin-top: 3px;
    }

    .gap-low { color: #ff9f43; }
    .gap-midlow { color: #ffd166; }
    .gap-mid { color: #40e0a0; }
    .gap-high { color: #59a7ff; }

    .no-results {
      display: none;
      color: var(--muted);
      text-align: center;
      padding: 40px 12px;
    }

    @media (max-width: 900px) {
      .team-grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; }
      .controls { grid-template-columns: 1fr; position: static; }
    }

    @media (max-width: 560px) {
      header, main { padding: 18px 12px; }
      .hero, .team-card, .controls { border-radius: 22px; }
      .hero { padding: 24px; }
      h1 { font-size: clamp(2.2rem, 13vw, 3.6rem); }
      .game-meta { grid-template-columns: repeat(2, 1fr); }
      .team-header { grid-template-columns: 1fr; }
    }
  </style>
</head>

      'New Zealand': ['New Zealand 1-0 Solomon Islands','New Zealand 2-0 Tahiti','New Zealand 0-2 Australia','New Zealand 1-1 China','New Zealand 1-0 Fiji'],
      Sweden: ['Sweden 2-0 Estonia','Sweden 1-3 Austria','Sweden 2-1 Moldova','Belgium 1-1 Sweden','Sweden 1-0 Albania'],
      'Saudi Arabia': ['Saudi Arabia 2-0 Jordan','Saudi Arabia 1-1 South Korea','Saudi Arabia 0-2 Mexico','Saudi Arabia 2-1 Oman','Saudi Arabia 1-0 Iraq'],
      Bosnia: ['Bosnia 1-1 Italy','Wales 1-1 Bosnia','Austria 1-1 Bosnia','Bosnia 3-1 Romania','Malta 1-4 Bosnia'],
      'Ivory Coast': ['Ivory Coast 2-0 Gambia','Ivory Coast 1-0 Mali','Ivory Coast 3-1 Zambia','Nigeria 1-1 Ivory Coast','Ivory Coast 0-4 South Korea'],
      Germany: ['Germany 2-1 Netherlands','Germany 2-0 France','Germany 1-1 Spain','Austria 2-0 Germany','Germany 2-1 Ghana'],
      Scotland: ['Scotland 2-0 Georgia','Spain 2-0 Scotland','Scotland 1-3 England','Scotland 3-0 Cyprus','Norway 1-2 Scotland'],
      'Cape Verde': ['Cape Verde 1-0 Guyana','Angola 0-0 Cape Verde','Cape Verde 2-1 Togo','Libya 0-0 Cape Verde','Cape Verde 1-1 Algeria'],
      Jordan: ['Jordan 2-0 Saudi Arabia','Jordan 2-2 Iraq','Jordan 1-1 South Korea','Jordan 0-2 Iran','Jordan 3-0 Tajikistan'],
      'South Korea': ['South Korea 1-0 Ghana','South Korea 2-0 Bolivia','South Korea 2-0 Paraguay','South Korea 0-4 Ivory Coast','Austria 1-0 South Korea'],
      Iraq: ['Iraq 1-0 Vietnam','Iraq 2-2 Jordan','Iraq 1-0 Indonesia','South Korea 1-0 Iraq','Iraq 0-0 Oman'],
      Haiti: ['Haiti 1-1 Guatemala','Haiti 2-0 St Kitts','Haiti 0-1 Jamaica','Haiti 3-0 Suriname','Haiti 1-2 Honduras'],
      'South Africa': ['South Africa 1-2 Cameroon','Zimbabwe 2-3 South Africa','South Africa 1-1 Panama','South Africa 0-0 Namibia','South Africa 1-0 Morocco'],
      Ecuador: ['Ecuador 0-0 Colombia','Ecuador 1-0 Chile','Brazil 1-1 Ecuador','Ecuador 2-1 Uruguay','Argentina 1-0 Ecuador'],
      Brazil: ['Brazil 3-1 Croatia','Brazil 1-2 France','Brazil 1-1 Tunisia','Brazil 2-0 Senegal','Japan 3-2 Brazil'],
      Ghana: ['Ghana 2-1 Madagascar','Ghana 1-0 Central African Rep','Ghana 0-2 Mexico','USA 4-0 Ghana','Ghana 2-0 Liberia'],
      Curaçao: ['Curaçao 1-0 Aruba','Barbados 0-1 Curaçao','Curaçao 2-2 Panama','Curaçao 0-2 Costa Rica','El Salvador 1-1 Curaçao'],
      Switzerland: ['Norway 0-0 Switzerland','Switzerland 3-4 Germany','Kosovo 1-1 Switzerland','Switzerland 4-1 Sweden','Slovenia 0-0 Switzerland'],
      Tunisia: ['Tunisia 1-0 Libya','Tunisia 0-1 Japan','Tunisia 1-1 South Korea','Tunisia 2-0 Malawi','Equatorial Guinea 1-0 Tunisia'],
      Paraguay: ['Morocco 2-1 Paraguay','Greece 0-1 Paraguay','Mexico 1-2 Paraguay','USA 2-1 Paraguay','South Korea 2-0 Paraguay'],
      Qatar: ['Qatar 2-1 UAE','Oman 0-0 Qatar','Qatar 1-4 Russia','Qatar 2-2 Bahrain','Qatar 1-2 Zimbabwe']
    };

    const teams = new Map();

    fixtures.forEach((row, index) => {
      const fixture = {
        index,
        day: row[0], date: row[1], time: row[2], city: row[3], temp: row[4], group: row[5], matchday: row[6],
        flag1: row[7], team1: row[8], team2: row[9], flag2: row[10], rank1: row[11], rank2: row[12], gap: row[13]
      };

      addTeamFixture(fixture.team1, fixture.flag1, fixture.rank1, fixture.group, fixture, fixture.team2, fixture.flag2, fixture.rank2);
      addTeamFixture(fixture.team2, fixture.flag2, fixture.rank2, fixture.group, fixture, fixture.team1, fixture.flag1, fixture.rank1);
    });

    function addTeamFixture(team, flag, rank, group, fixture, opponent, opponentFlag, opponentRank) {
      if (!teams.has(team)) {
        teams.set(team, { team, flag, rank, group, lastFive: lastFiveResults[team] || ['TBC','TBC','TBC','TBC','TBC'], games: [] });
      }
      teams.get(team).games.push({ ...fixture, opponent, opponentFlag, opponentRank });
    }

    const teamGrid = document.getElementById('teamGrid');
    const searchInput = document.getElementById('searchInput');
    const groupFilter = document.getElementById('groupFilter');
    const sortSelect = document.getElementById('sortSelect');
    const noResults = document.getElementById('noResults');

    [...new Set([...teams.values()].map(t => t.group))].sort().forEach(group => {
      groupFilter.add(new Option(`Group ${group}`, group));
    });

    function gapClass(gap) {
      if (gap <= 15) return 'gap-low';
      if (gap <= 30) return 'gap-midlow';
      if (gap <= 45) return 'gap-mid';
      return 'gap-high';
    }

    function formatResult(result) {
      const flags = {
        Portugal: '🇵🇹', Bosnia: '🇧🇦', Slovakia: '🇸🇰', Luxembourg: '🇱🇺', Iceland: '🇮🇸', Poland: '🇵🇱',
        Spain: '🇪🇸', Norway: '🇳🇴', Georgia: '🇬🇪', Scotland: scotlandFlag, Cyprus: '🇨🇾', Italy: '🇮🇹',
        Belgium: '🇧🇪', Sweden: '🇸🇪', Austria: '🇦🇹', Estonia: '🇪🇪', Azerbaijan: '🇦🇿', Serbia: '🇷🇸',
        Japan: '🇯🇵', Germany: '🇩🇪', Türkiye: '🇹🇷', Syria: '🇸🇾', 'North Korea': '🇰🇵', Tunisia: '🇹🇳',
        USA: '🇺🇸', Mexico: '🇲🇽', Jamaica: '🇯🇲', Canada: '🇨🇦', Panama: '🇵🇦', Cuba: '🇨🇺',
        France: '🇫🇷', Greece: '🇬🇷', Netherlands: '🇳🇱', Gibraltar: '🇬🇮', 'Republic Ireland': '🇮🇪',
        Iran: '🇮🇷', 'Hong Kong': '🇭🇰', Uzbekistan: '🇺🇿', Kyrgyzstan: '🇰🇬', Jordan: '🇯🇴', UAE: '🇦🇪',
        Argentina: '🇦🇷', Peru: '🇵🇪', Paraguay: '🇵🇾', Chile: '🇨🇱', Brazil: '🇧🇷', Uruguay: '🇺🇾',
        England: englandFlag, Ukraine: '🇺🇦', Australia: '🇦🇺', Bolivia: '🇧🇴',
        Morocco: '🇲🇦', Ecuador: '🇪🇨', Senegal: '🇸🇳', Nigeria: '🇳🇬', Cameroon: '🇨🇲',
        'Ivory Coast': '🇨🇮', Gambia: '🇬🇲', Algeria: '🇩🇿', 'DR Congo': '🇨🇩', Lebanon: '🇱🇧',
        Egypt: '🇪🇬', 'Sierra Leone': '🇸🇱', 'Burkina Faso': '🇧🇫', Guinea: '🇬🇳', Ethiopia: '🇪🇹',
        Ireland: '🇮🇪', Mauritania: '🇲🇷', Sudan: '🇸🇩', Gabon: '🇬🇦', Togo: '🇹🇬',
        Wales: '🏴', Croatia: '🇭🇷', Latvia: '🇱🇻', Uganda: '🇺🇬', Mozambique: '🇲🇿',
        Colombia: '🇨🇴', Venezuela: '🇻🇪', Armenia: '🇦🇲', Martinique: '🇲🇶', 'Costa Rica': '🇨🇷',
        Turkmenistan: '🇹🇲', Oman: '🇴🇲', Denmark: '🇩🇰', 'Faroe Islands': '🇫🇴',
        Czechia: '🇨🇿', 'New Zealand': '🇳🇿', Tahiti: '🇵🇫', China: '🇨🇳', Fiji: '🇫🇯',
        'Saudi Arabia': '🇸🇦', 'South Korea': '🇰🇷', Iraq: '🇮🇶', Malta: '🇲🇹', Romania: '🇷🇴',
        Ghana: '🇬🇭', 'Cape Verde': '🇨🇻', Guyana: '🇬🇾', Angola: '🇦🇴', Libya: '🇱🇾',
        Tajikistan: '🇹🇯', Vietnam: '🇻🇳', Indonesia: '🇮🇩', Haiti: '🇭🇹', Guatemala: '🇬🇹',
        'St Kitts': '🇰🇳', Suriname: '🇸🇷', Honduras: '🇭🇳', 'South Africa': '🇿🇦', Zimbabwe: '🇿🇼',
        Namibia: '🇳🇦', Madagascar: '🇲🇬', 'Central African Rep': '🇨🇫', Liberia: '🇱🇷',
        Curaçao: '🇨🇼', Aruba: '🇦🇼', Barbados: '🇧🇧', 'El Salvador': '🇸🇻', Kosovo: '🇽🇰',
        Slovenia: '🇸🇮', Malawi: '🇲🇼', 'Equatorial Guinea': '🇬🇶', Qatar: '🇶🇦', Bahrain: '🇧🇭', Russia: '🇷🇺'
      };

      let formatted = result;
      const countries = Object.keys(flags).sort((a, b) => b.length - a.length);

      countries.forEach(country => {
        formatted = formatted.split(country).join(flags[country]);
      });

      return formatted;
    }

    function render() {
      const query = searchInput.value.toLowerCase();
      const group = groupFilter.value;
      const sort = sortSelect.value;

      const rows = [...teams.values()]
        .filter(t => (!query || t.team.toLowerCase().includes(query)) && (!group || t.group === group))
        .sort((a, b) => {
          if (sort === 'rank') return a.rank - b.rank;
          if (sort === 'country') return a.team.localeCompare(b.team);
          return a.group.localeCompare(b.group) || a.rank - b.rank;
        });

      teamGrid.innerHTML = rows.map(team => `
        <article class="team-card">
          <div class="team-header">
            <div>
              <div class="team-name"><span>${team.flag}</span><span>${team.team}</span></div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
              <span class="group-pill">Group ${team.group}</span>
              <span class="rank-pill">Rank ${team.rank}</span>
            </div>
          </div>
          <div class="team-body">
            <section>
              <div class="section-title">Last five results</div>
              <div class="last-five">${team.lastFive.map(result => `<span class="result-pill" contenteditable="true">${formatResult(result)}</span>`).join('')}</div>
            </section>
            <section>
              <div class="section-title">Group games</div>
              <div class="games">
                ${team.games.sort((a, b) => a.matchday - b.matchday).map(game => `
                  <div class="game">
                    <div class="game-top">
                      <div class="opponent">v ${game.opponent} ${game.opponentFlag}</div>
                      <span class="group-pill">MD ${game.matchday}</span>
                    </div>
                    <div class="game-meta">
                      <div>Date<span class="meta-value">${game.date}</span></div>
                      <div>Time<span class="meta-value">${game.time}</span></div>
                      <div>Ranks<span class="meta-value">${team.rank} vs ${game.opponentRank}</span></div>
                      <div>Gap<span class="meta-value ${gapClass(game.gap)}">${game.gap}</span></div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </section>
          </div>
        </article>
      `).join('');

      noResults.style.display = rows.length ? 'none' : 'block';
    }

    [searchInput, groupFilter, sortSelect].forEach(el => el.addEventListener('input', render));
    render();
  </script>
</body>
</html>
