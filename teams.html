<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Fantasy Teams</title>
  <style>
    :root {
      --bg: #08111f;
      --card: #111c2e;
      --text: #f6f8fb;
      --muted: #aab7c8;
      --accent: #40e0a0;
      --accent-2: #59a7ff;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(64,224,160,0.22), transparent 34rem),
        radial-gradient(circle at top right, rgba(89,167,255,0.18), transparent 34rem),
        var(--bg);
      min-height: 100vh;
    }

    header, main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .hero, .controls, .team-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 32px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-weight: 800;
      font-size: 0.8rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: 0.95;
    }

    .subtitle {
      max-width: 780px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .site-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-start;
      width: fit-content;
      margin-bottom: 32px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(8,17,31,0.42);
    }

    .site-nav a {
      text-decoration: none;
      padding: 9px 16px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 850;
      transition: background 160ms ease, color 160ms ease;
    }

    .site-nav a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .site-nav a.active {
      color: #06101d;
      background: var(--accent);
    }

    .controls {
      padding: 18px;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
      position: sticky;
      top: 12px;
      z-index: 5;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(8,17,31,0.72);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
    }

    select option { background: #111c2e; }
    input::placeholder { color: #77869a; }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .team-card {
      overflow: hidden;
    }

    .team-header {
      padding: 22px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      background: radial-gradient(circle at top left, rgba(64,224,160,0.12), transparent 60%);
    }

    .team-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.6rem;
      font-weight: 950;
    }

    .flag-img {
      width: 1em;
      height: 1em;
      vertical-align: -0.1em;
      display: inline-block;
    }

    .rank-pill, .group-pill, .result-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 900;
      border: 1px solid rgba(89,167,255,0.28);
      background: rgba(89,167,255,0.15);
      color: #b9d7ff;
      white-space: nowrap;
    }

    .group-pill {
      background: rgba(64,224,160,0.12);
      color: #a9ffd8;
      border-color: rgba(64,224,160,0.28);
    }

    .team-body {
      padding: 18px 22px 22px;
      display: grid;
      gap: 18px;
    }

    .section-title {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.75rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .last-five {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .result-pill {
      min-width: 42px;
      background: rgba(255,255,255,0.055);
      color: var(--text);
      border-color: var(--border);
    }

    .games {
      display: grid;
      gap: 10px;
    }

    .game {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(8,17,31,0.4);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .game-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .opponent {
      font-weight: 900;
      font-size: 0.9rem;
    }

    .game-meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .meta-value {
      display: block;
      color: var(--text);
      font-weight: 850;
      margin-top: 3px;
    }

    .gap-low { color: #ff9f43; }
    .gap-midlow { color: #ffd166; }
    .gap-mid { color: #40e0a0; }
    .gap-high { color: #59a7ff; }

    .no-results {
      display: none;
      color: var(--muted);
      text-align: center;
      padding: 40px 12px;
    }

    @media (max-width: 900px) {
      .team-grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; }
      .controls { grid-template-columns: 1fr; position: static; }
    }

    @media (max-width: 560px) {
      header, main { padding: 18px 12px; }
      .hero, .team-card, .controls { border-radius: 22px; }
      .hero { padding: 24px; }
      h1 { font-size: clamp(2.2rem, 13vw, 3.6rem); }
      .game-meta { grid-template-columns: repeat(2, 1fr); }

      .team-header {
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: start;
      }

      .team-name {
        min-width: 0;
        font-size: 2.25rem;
        line-height: 1;
        gap: 12px;
      }

      .team-name span:last-child {
        display: inline;
        word-break: normal;
      }

      .team-header > div:last-child {
        display: flex !important;
        flex-direction: row !important;
        justify-content: flex-start !important;
        align-items: center !important;
        gap: 8px !important;
        flex-wrap: wrap;
      }

      .team-header .group-pill,
      .team-header .rank-pill {
        width: fit-content;
        font-size: 0.95rem;
        padding: 7px 12px;
        line-height: 1;
      }
    }

      .team-name {
        min-width: 0;
        font-size: 1.25rem;
        line-height: 1.05;
      }

      .team-name span:last-child {
        display: block;
        word-break: keep-all;
      }

      .team-header > div:last-child {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        flex-shrink: 0;
      }

      .group-pill,
      .rank-pill {
        width: fit-content;
      }
    }


    /* Keep Group + Rank side-by-side on desktop/tablet team cards */
    @media (min-width: 561px) {
      .team-header {
        grid-template-columns: minmax(0, 1fr) max-content;
      }

      .team-header > div:last-child {
        display: inline-flex !important;
        flex-direction: row !important;
        align-items: center !important;
        justify-content: flex-end !important;
        gap: 8px !important;
        flex-wrap: nowrap !important;
        white-space: nowrap !important;
        min-width: max-content;
      }

      .team-header .group-pill,
      .team-header .rank-pill {
        flex: 0 0 auto;
        white-space: nowrap;
      }
    }


    .team-pills {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      align-items: center;
      white-space: nowrap;
    }

    @media (max-width: 560px) {
      .team-pills {
        justify-content: flex-start;
        flex-wrap: wrap;
      }
    }


    /* FINAL FIX: desktop team-card header layout */
    .team-title-wrap {
      min-width: 0;
    }

    .team-pills {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: nowrap !important;
      align-items: center !important;
      justify-content: flex-end !important;
      gap: 8px !important;
      min-width: max-content !important;
      white-space: nowrap !important;
    }

    .team-pills .group-pill,
    .team-pills .rank-pill {
      flex: 0 0 auto !important;
      white-space: nowrap !important;
    }

    @media (min-width: 561px) {
      .team-header {
        display: grid !important;
        grid-template-columns: minmax(0, 1fr) max-content !important;
        align-items: start !important;
      }
    }

    @media (max-width: 560px) {
      .team-header {
        grid-template-columns: 1fr !important;
      }

      .team-name {
        font-size: 1.9rem !important;
        line-height: 1.02 !important;
      }

      .team-pills {
        justify-content: flex-start !important;
        flex-wrap: wrap !important;
        min-width: 0 !important;
      }

      .team-pills .group-pill,
      .team-pills .rank-pill {
        font-size: 0.9rem;
        padding: 7px 13px;
      }
    }

</style>

}
</style>

  font-size: 0.78rem !important;

  min-height: 0 !important;
  height: auto !important;
}
</style>

  color: #a9ffd8;
  white-space: nowrap;
  min-height: unset !important;
}

    @media (max-width: 560px) {
      .nav-tabs {
        display: flex !important;
        width: 100%;
        gap: 8px;
        padding: 8px;
        border-radius: 999px;
        overflow: hidden;
      }

      .nav-tabs a {
        flex: 1 1 0;
        min-width: 0;
        text-align: center;
        font-size: 1rem;
        padding: 14px 10px;
        border-radius: 999px;
        white-space: nowrap;
      }
    }

</style>

    max-width: 100% !important;
    gap: 4px !important;
    padding: 6px !important;
    margin-bottom: 28px !important;
    border-radius: 999px !important;
    overflow: hidden !important;
  }

  .site-nav a {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    min-width: 0 !important;
    width: 100% !important;
    padding: 11px 4px !important;
    font-size: 0.82rem !important;
    line-height: 1 !important;
    white-space: nowrap !important;
    text-align: center !important;
    border-radius: 999px !important;
  }
}
</style>

                      <span class="md-pill">MD ${game.matchday}</span>
                    </div>
                    <div class="game-meta">
                      <div>Date<span class="meta-value">${game.date}</span></div>
                      <div>Time<span class="meta-value">${game.time}</span></div>
                      <div>Ranks<span class="meta-value">${team.rank} vs ${game.opponentRank}</span></div>
                      <div>Gap<span class="meta-value ${gapClass(game.gap)}">${game.gap}</span></div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </section>
          </div>
        </article>
      `).join('');

      noResults.style.display = rows.length ? 'none' : 'block';
    }

    [searchInput, groupFilter, sortSelect].forEach(el => el.addEventListener('input', render));
    render();
  </script>
</body>
</html>
