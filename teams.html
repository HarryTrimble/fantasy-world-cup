  <style>
    :root {
      --bg: #08111f;
      --card: #111c2e;
      --text: #f6f8fb;
      --muted: #aab7c8;
      --accent: #40e0a0;
      --accent-2: #59a7ff;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(64,224,160,0.22), transparent 34rem),
        radial-gradient(circle at top right, rgba(89,167,255,0.18), transparent 34rem),
        var(--bg);
      min-height: 100vh;
    }

    header, main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    header {
      padding-bottom: 10px;
    }

    main {
      padding-top: 8px;
    }

    .controls, .team-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 24px;
      background: none;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      padding: 0;
    }

    .hero-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 32px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-weight: 800;
      font-size: 0.8rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: 0.95;
    }

    .subtitle {
      max-width: 780px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .site-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      width: 100%;
      max-width: 560px;
      margin-bottom: 22px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(8,17,31,0.42);
      backdrop-filter: blur(12px);
    }

    .site-nav a {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 14px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 850;
      font-size: 1rem;
      line-height: 1;
      white-space: nowrap;
      transition: background 160ms ease, color 160ms ease;
    }

    .site-nav a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .site-nav a.active {
      color: #06101d;
      background: var(--accent);
    }


    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 20px;
      min-height: 118px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .stat-value {
      font-size: 2.1rem;
      font-weight: 950;
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .controls {
      padding: 18px;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
      position: sticky;
      top: 12px;
      z-index: 5;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(8,17,31,0.72);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
    }

    select option { background: #111c2e; }
    input::placeholder { color: #77869a; }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .team-card {
      overflow: hidden;
    }

    .team-header {
      padding: 22px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      background: radial-gradient(circle at top left, rgba(64,224,160,0.12), transparent 60%);
    }

    .team-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.6rem;
      font-weight: 950;
    }

    .flag-img {
      width: 1em;
      height: 1em;
      vertical-align: -0.1em;
      display: inline-block;
    }

    .rank-pill, .group-pill, .result-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 900;
      border: 1px solid rgba(89,167,255,0.28);
      background: rgba(89,167,255,0.15);
      color: #b9d7ff;
      white-space: nowrap;
    }

    .group-pill {
      background: rgba(64,224,160,0.12);
      color: #a9ffd8;
      border-color: rgba(64,224,160,0.28);
    }

    .team-body {
      padding: 18px 22px 22px;
      display: grid;
      gap: 18px;
    }

    .section-title {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.75rem;
      font-weight: 900;
      margin-bottom: 10px;
    }
.games {
      display: grid;
      gap: 10px;
    }

    .game {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(8,17,31,0.4);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .game-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .opponent {
      font-weight: 900;
      font-size: 0.9rem;
    }

    .game-meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .meta-value {
      display: block;
      color: var(--text);
      font-weight: 850;
      margin-top: 3px;
    }

    .gap-high { color: #59a7ff; }   /* Blue = big plus */
    .gap-mid { color: #40e0a0; }    /* Green = medium plus */
    .gap-midlow { color: #ffd166; } /* Yellow = small +/- */
    .gap-low { color: #ff9f43; }    /* Orange = medium minus */
    .gap-danger { color: #ff5c5c; } /* Red = big minus */

    .no-results {
      display: none;
      color: var(--muted);
      text-align: center;
      padding: 40px 12px;
    }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }

      .team-grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; }
  
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .stat-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 20px;
      min-height: 118px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .stat-value {
      font-size: 2.1rem;
      font-weight: 950;
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .controls { grid-template-columns: 1fr; position: static; }
    }

    @media (max-width: 560px) {
      h1 {
        font-size: 2.2rem !important;
        line-height: 1.05 !important;
      }

      .stats-grid { display: none; }

      header, main { padding: 18px 12px; }

      header {
        padding-bottom: 6px;
      }

      main {
        padding-top: 4px;
      }
      .hero-card, .team-card, .controls { border-radius: 22px; }
      .hero-card { padding: 24px; }
      h1 { font-size: clamp(2.2rem, 13vw, 3.6rem); }
      .game-meta { grid-template-columns: repeat(2, 1fr); }

      .team-header {
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: start;
      }

      .team-name {
        min-width: 0;
        font-size: 2.25rem;
        line-height: 1;
        gap: 12px;
      }

      .team-name span:last-child {
        display: inline;
        word-break: normal;
      }

      .team-header > div:last-child {
        display: flex !important;
        flex-direction: row !important;
        justify-content: flex-start !important;
        align-items: center !important;
        gap: 8px !important;
        flex-wrap: wrap;
      }

      .team-header .group-pill,
      .team-header .rank-pill {
        width: fit-content;
        font-size: 0.95rem;
        padding: 7px 12px;
        line-height: 1;
      }
    }

      .team-name {
        min-width: 0;
        font-size: 1.25rem;
        line-height: 1.05;
      }

      .team-name span:last-child {
        display: block;
        word-break: keep-all;
      }

      .team-header > div:last-child {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        flex-shrink: 0;
      }

      .group-pill,
      .rank-pill {
        width: fit-content;
      }
    }


    /* Keep Group + Rank side-by-side on desktop/tablet team cards */
    @media (min-width: 561px) {
      .team-header {
        grid-template-columns: minmax(0, 1fr) max-content;
      }

      .team-header > div:last-child {
        display: inline-flex !important;
        flex-direction: row !important;
        align-items: center !important;
        justify-content: flex-end !important;
        gap: 8px !important;
        flex-wrap: nowrap !important;
        white-space: nowrap !important;
        min-width: max-content;
      }

      .team-header .group-pill,
      .team-header .rank-pill {
        flex: 0 0 auto;
        white-space: nowrap;
      }
    }


    .team-pills {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      align-items: center;
      white-space: nowrap;
    }

    @media (max-width: 560px) {
      .team-pills {
        justify-content: flex-start;
        flex-wrap: wrap;
      }
    }


    /* FINAL FIX: desktop team-card header layout */
    .team-title-wrap {
      min-width: 0;
    }

    .team-pills {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: nowrap !important;
      align-items: center !important;
      justify-content: flex-end !important;
      gap: 8px !important;
      min-width: max-content !important;
      white-space: nowrap !important;
    }

    .team-pills .group-pill,
    .team-pills .rank-pill {
      flex: 0 0 auto !important;
      white-space: nowrap !important;
    }

    @media (min-width: 561px) {
      .team-header {
        display: grid !important;
        grid-template-columns: minmax(0, 1fr) max-content !important;
        align-items: start !important;
      }
    }

    @media (max-width: 560px) {
      .team-header {
        grid-template-columns: 1fr !important;
      }

      .team-name {
        font-size: 1.9rem !important;
        line-height: 1.02 !important;
      }

      .team-pills {
        justify-content: flex-start !important;
        flex-wrap: wrap !important;
        min-width: 0 !important;
      }

      .team-pills .group-pill,
      .team-pills .rank-pill {
        font-size: 0.9rem;
        padding: 7px 13px;
      }
    }


@media (max-width: 560px) {

    }

    .form-score {

.form-flag {

      overflow: hidden;
    }

    .form-flag .flag-img {
      width: 1em;

    }

    @media (max-width: 560px) {

      }

      .form-score {

      }

      .form-flag {

      }
    }

    function gapClass(teamRank, opponentRank) {
      const gap = Math.abs(teamRank - opponentRank);
      const diff = opponentRank - teamRank;

      // Big plus gap (much weaker opponent)
      if (diff >= 45) return 'gap-high';

      // Medium plus gap
      if (diff >= 16) return 'gap-mid';

      // Small plus/minus gap
      if (diff > -16) return 'gap-midlow';

      // Medium minus gap
      if (diff > -45) return 'gap-low';

      // Big minus gap (much stronger opponent)
      return 'gap-danger';
    }

    function formatTeamFormResult(result, teamName) {
      const match = result.match(/^(.*?)\s+(\d+)[â€“-](\d+)\s+(.*?)$/);
      if (!match) {
        return `<div class="form-result"><span class="form-score draw">${result}</span></div>`;
      }

      const homeTeam = match[1].trim();
      const homeScore = Number(match[2]);
      const awayScore = Number(match[3]);
      const awayTeam = match[4].trim();
      const isHome = homeTeam === teamName;
      const teamScore = isHome ? homeScore : awayScore;
      const opponentScore = isHome ? awayScore : homeScore;
      const opponent = isHome ? awayTeam : homeTeam;
      const outcome = teamScore > opponentScore ? 'win' : teamScore < opponentScore ? 'loss' : 'draw';

      return `<div class="form-result" title="${result}">
        <span class="form-score ${outcome}">${teamScore} - ${opponentScore}</span>
        <span class="form-flag">${countryFlag(opponent)}</span>
      </div>`;
    }


    function formPoints(result, teamName) {
      const match = result.match(/^(.*?)\s+(\d+)[â€“-](\d+)\s+(.*?)$/);
      if (!match) return 0;

      const homeTeam = match[1].trim();
      const homeScore = Number(match[2]);
      const awayScore = Number(match[3]);
      const awayTeam = match[4].trim();

      const isHome = homeTeam === teamName;
      const teamScore = isHome ? homeScore : awayScore;
      const opponentScore = isHome ? awayScore : homeScore;

      if (teamScore > opponentScore) return 3;
      if (teamScore === opponentScore) return 1;
      return 0;
    }

    function formScore(team) {
      return team.lastFive.reduce((total, result) => total + formPoints(result, team.team), 0);
    }


    function populateStats() {
      const teamRows = [...teams.values()];
      const bestRankTeam = [...teamRows].sort((a, b) => a.rank - b.rank)[0];
      const topFormTeam = [...teamRows].sort((a, b) => formScore(b) - formScore(a) || a.rank - b.rank)[0];
      const biggestGap = Math.max(...fixtures.map(row => Number(row[14])));

      document.getElementById('totalTeams').textContent = teamRows.length;
      document.getElementById('bestRank').textContent = bestRankTeam ? bestRankTeam.rank : 0;
      document.getElementById('topFormScore').textContent = topFormTeam ? formScore(topFormTeam) : 0;
      document.getElementById('biggestTeamGap').textContent = biggestGap;
    }

    function render() {
      const query = searchInput.value.toLowerCase();
      const group = groupFilter.value;
      const sort = sortSelect.value;

      const rows = [...teams.values()]
        .filter(t => (!query || t.team.toLowerCase().includes(query)) && (!group || t.group === group))
        .sort((a, b) => {
          if (sort === 'rank') return a.rank - b.rank;
          if (sort === 'country') return a.team.localeCompare(b.team);
          if (sort === 'form') return formScore(b) - formScore(a) || a.rank - b.rank;

          if (sort === 'fixture-gap') {
            const avgGapA = a.games.reduce((sum, game) => sum + (game.opponentRank - a.rank), 0) / a.games.length;
            const avgGapB = b.games.reduce((sum, game) => sum + (game.opponentRank - b.rank), 0) / b.games.length;

            return avgGapB - avgGapA;
          }

          return a.group.localeCompare(b.group) || a.rank - b.rank;
        });

      teamGrid.innerHTML = rows.map(team => `
        <article class="team-card">
          <div class="team-header">
            <div class="team-title-wrap">
              <div class="team-name"><span>${team.flag}</span><span>${team.team}</span></div>
            </div>
            <div class="team-pills">
              <span class="group-pill">Group ${team.group}</span>
              <span class="rank-pill">FIFA Rank ${team.rank}</span>
            </div>
          </div>
          <div class="team-body">
            <section>
              <div class="section-title">Last five results</div>
              <div class="last-five">${team.lastFive.map(result => formatTeamFormResult(result, team.team)).join('')}</div>
            </section>
            <section>
              <div class="section-title">Group games</div>
              <div class="games">
                ${team.games.sort((a, b) => a.matchday - b.matchday).map(game => `
                  <div class="game">
                    <div class="game-top">
                      <div class="opponent">v ${game.opponent} ${game.opponentFlag}</div>
                      <span class="md-pill">MD ${game.matchday}</span>
                    </div>
                    <div class="game-meta">
                      <div>Date<span class="meta-value">${game.date}</span></div>
                      <div>Time<span class="meta-value">${game.time}</span></div>
                      <div>Ranks<span class="meta-value">${team.rank} vs ${game.opponentRank}</span></div>
                      <div>
                        Gap
                        <span class="meta-value ${gapClass(team.rank, game.opponentRank)}">
                          ${game.opponentRank > team.rank ? '+' : '-'}${Math.abs(team.rank - game.opponentRank)}
                        </span>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </section>
          </div>
        </article>
      `).join('');

      noResults.style.display = rows.length ? 'none' : 'block';
    }

    [searchInput, groupFilter, sortSelect].forEach(el => el.addEventListener('input', render));
    populateStats();
    render();
  </script>
